<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>MindfulCloud</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>

    <div class="container">
      <h1>☁️ MindfulCloud</h1>

      <div class="section">
        <div class="section">
          <div class="section-header">YouTube</div>
          <div class="section-content">

            <label class="row" for="ytHamburger">
              <span>Menu</span>
              <div class="switch">
                <input type="checkbox" id="ytHamburger">
                <span class="slider"></span>
              </div>
            </label>

            <label class="row" for="ytHideRec">
              <span>Hide Recommendations</span>
              <div class="switch">
                <input type="checkbox" id="ytHideRec">
                <span class="slider"></span>
              </div>
            </label>

            <label class="row" for="ytHideComments">
              <span>Hide Comments</span>
              <div class="switch">
                <input type="checkbox" id="ytHideComments">
                <span class="slider"></span>
              </div>
            </label>

            <div class="color-section">
              <div class="row clickable-row" id="ytProgressRow">
                <span>Progress Bar</span>
                <div class="color-box" id="ytProgressColorBox"></div>
              </div>
              <div class="color-picker" id="ytProgressPicker">
                <!-- default -->
                <div data-color="#ff0000"></div>

                <!-- reds -->
                <div data-color="#e63946"></div>
                <div data-color="#d62828"></div>
                <div data-color="#ff006e"></div>
                <div data-color="#ff4d6d"></div>

                <!-- oranges / warm -->
                <div data-color="#ff7b00"></div>
                <div data-color="#ff8800"></div>
                <div data-color="#d4a373"></div>
                <div data-color="#b08968"></div>
                <div data-color="#7f5539"></div>

                <!-- yellows -->
                <div data-color="#ffbe0b"></div>
                <div data-color="#ffd166"></div>
                <div data-color="#f4a261"></div>

                <!-- greens -->
                <div data-color="#a3b18a"></div>
                <div data-color="#588157"></div>
                <div data-color="#3a5a40"></div>
                <div data-color="#2a9d8f"></div>
                <div data-color="#00f5d4"></div>

                <!-- blues -->
                <div data-color="#4cafef"></div>
                <div data-color="#3a86ff"></div>
                <div data-color="#4361ee"></div>
                <div data-color="#4895ef"></div>
                <div data-color="#1d3557"></div>

                <!-- purple -->
                <div data-color="#8338ec"></div>
                <div data-color="#9d4edd"></div>
                <div data-color="#7209b7"></div>

                <!-- pink -->
                <div data-color="#ff70a6"></div>
                <div data-color="#ff99c8"></div>

                <!-- neutral / aesthetic -->
                <div data-color="#c9ada7"></div>
                <div data-color="#b7b7a4"></div>
                <div data-color="#a5a58d"></div>
                <div data-color="#6b705c"></div>

                <!-- grayscale -->
                <div data-color="#ffffff"></div>
                <div data-color="#cccccc"></div>
                <div data-color="#999999"></div>
                <div data-color="#555555"></div>
              </div>
            </div>

            <div class="color-section">
              <div class="row clickable-row" id="ytScrubberRow">
                <span>Scrubber (Circle)</span>
                <div class="color-box" id="ytScrubberColorBox"></div>
              </div>
              <div class="color-picker" id="ytScrubberPicker">
                <!-- pure -->
                <div data-color="#ffffff"></div>
                <div data-color="#000000"></div>

                <!-- light neutrals -->
                <div data-color="#f8f9fa"></div>
                <div data-color="#f0e4d6"></div>
                <div data-color="#ede0d4"></div>

                <!-- mid neutrals -->
                <div data-color="#d6ccc2"></div>
                <div data-color="#b7b7a4"></div>
                <div data-color="#a5a58d"></div>

                <!-- dark -->
                <div data-color="#6b705c"></div>
                <div data-color="#3a3a3a"></div>
                <div data-color="#1c1b1a"></div>

                <!-- reds -->
                <div data-color="#ff0000"></div>
                <div data-color="#e63946"></div>
                <div data-color="#ff006e"></div>

                <!-- blues -->
                <div data-color="#4cafef"></div>
                <div data-color="#3a86ff"></div>
                <div data-color="#4361ee"></div>

                <!-- greens -->
                <div data-color="#588157"></div>
                <div data-color="#2a9d8f"></div>

                <!-- purple -->
                <div data-color="#8338ec"></div>
                <div data-color="#9d4edd"></div>

                <!-- aesthetic soft -->
                <div data-color="#c9ada7"></div>
                <div data-color="#9a8c98"></div>
                <div data-color="#84a59d"></div>

                <!-- neon -->
                <div data-color="#00f5d4"></div>
                <div data-color="#ffbe0b"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">Reddit</div>
          <div class="section-content">
            <label class="row" for="rdMinimal">
              <span>Minimal Mode</span>
              <div class="switch">
                <input type="checkbox" id="rdMinimal">
                <span class="slider"></span>
              </div>
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-header">Twitter / X</div>
          <div class="section-content">
            <label class="row" for="twFocus">
              <span>Focus Mode</span>
              <div class="switch">
                <input type="checkbox" id="twFocus">
                <span class="slider"></span>
              </div>
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-header">Pinterest</div>
          <div class="section-content">
            <label class="row" for="ptDark">
              <span>Minimal Dark Mode</span>
              <div class="switch">
                <input type="checkbox" id="ptDark">
                <span class="slider"></span>
              </div>
            </label>
          </div>
        </div>

      </div>

      <script src="popup.js"></script>
  </body>
</html>
