<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <title>MindfulCloud</title>
</head>

<body>

    <div class="header">
        <div class="title">MindfulCloud</div>
    </div>

    <!-- MASTER -->
    <div class="card">
        <span>Extension</span>
        <label class="switch">
            <input type="checkbox" id="master-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <!-- YOUTUBE ACCORDION -->
    <div class="accordion">

        <div class="accordion-header" id="yt-header">
            <span>YouTube</span>
            <span class="arrow" id="yt-arrow">▸</span>
        </div>

        <div class="accordion-content" id="yt-content">

            <div class="card small">
                <span>Recommendations</span>
                <label class="switch">
                    <input type="checkbox" id="yt-rec-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="card small">
                <span>Comments</span>
                <label class="switch">
                    <input type="checkbox" id="yt-comments-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="card small">
                <span>Progress Bar</span>
                <input type="text" id="yt-progress-color" placeholder="#b1aaff" maxlength="7">
            </div>

            <div class="card small">
                <span>Scrubber Icon</span>
                <input type="text" id="yt-scrubber-color" placeholder="#aaaaff" maxlength="7">
            </div>

        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
