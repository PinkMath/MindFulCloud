<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --text-main: #f0e4d6;
            --text-dim: #a89f94;
            --accent: #008080; /* Mindful Teal */
            --accent-dim: #004d4d;
        }

        body {
            width: 220px;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
        }

        .divider {
            height: 1px;
            background: #333;
            margin: 15px 0;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
        }

        .status-label {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .footer {
            margin-top: 15px;
            font-size: 10px;
            color: var(--text-dim);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icon.png" class="logo">
        <h1 class="title">MINDFUL</h1>
    </div>

    <div class="status-container">
        <span class="status-label" id="status-text">Enabled</span>
        <label class="switch">
            <input type="checkbox" id="power-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="footer">
        Stay intentional. Stay focused.
    </div>

    <script src="popup.js"></script>
</body>
</html>
